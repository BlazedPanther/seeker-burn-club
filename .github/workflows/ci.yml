name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Lint Typecheck Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          SOLANA_RPC_URL: https://api.devnet.solana.com
          SKR_MINT: CyHB1R1isTShErodMLCWCeXHTQC9SkVqJDG1Ezzk83GM
          TREASURY_WALLET: nP25k2QNCiGKwQLyYvuLhKpbRukN7n7qQtbbcEm4Te5
          TREASURY_SKR_ATA: Pn6FkEHtDqA8RDxJEgkjxUozLjn2weLX58bVS2aWUPD
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
        run: npm run test

      - name: Rarity Audit
        run: npm run audit:rarity
        continue-on-error: true

      - name: Security Audit (Production Dependencies)
        run: npm run audit:prod

  android:
    name: Android Debug Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
